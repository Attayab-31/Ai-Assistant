<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Sign Up</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #f6f7f9; font-family: system-ui, sans-serif; color: #172033; }
    form { width: min(380px, calc(100vw - 32px)); background: white; border: 1px solid #d9dee8; border-radius: 8px; padding: 22px; display: grid; gap: 12px; }
    h1 { font-size: 22px; margin: 0 0 4px; }
    label { display: grid; gap: 6px; font-size: 13px; color: #667085; }
    input, button { font: inherit; border-radius: 6px; padding: 10px; border: 1px solid #d9dee8; }
    button { color: white; background: #2563eb; border-color: #2563eb; font-weight: 700; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
    button:disabled { opacity: .6; cursor: progress; }
    .spinner { width: 15px; height: 15px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; display: inline-block; animation: spin .6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: #dc2626; min-height: 20px; }
    .ok { color: #16a34a; min-height: 20px; }
    .hint { font-size: 12px; color: #667085; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <form id="signup-form">
    <h1>Create Admin Account</h1>
    <label>Full name <input name="full_name" type="text" autocomplete="name" required></label>
    <label>Email <input name="email" type="email" autocomplete="username" required></label>
    <label>Password <input name="password" type="password" autocomplete="new-password" minlength="8" required></label>
    <button type="submit" id="submit">Sign Up</button>
    <div class="error" id="error"></div>
    <div class="ok" id="ok"></div>
    <div class="hint">The first account becomes the super admin. After that, only a
      super admin can add accounts. Already have one? <a href="/admin/login">Sign in</a>.</div>
  </form>
  <script>
    const form = document.getElementById('signup-form');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const btn = document.getElementById('submit');
      const err = document.getElementById('error');
      const ok = document.getElementById('ok');
      err.textContent = '';
      ok.textContent = '';
      const originalBtn = btn.innerHTML;
      let redirecting = false;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Creating account\u2026';
      const data = new FormData(event.currentTarget);
      try {
        const response = await fetch('/auth/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            full_name: data.get('full_name'),
            email: data.get('email'),
            password: data.get('password'),
          }),
        });
        const body = await response.json().catch(() => ({}));
        if (response.ok) {
          redirecting = true;
          ok.textContent = 'Account created. Redirecting…';
          btn.innerHTML = '<span class="spinner"></span> Redirecting\u2026';
          window.location.href = '/admin/dashboard';
        } else {
          err.textContent = body.detail || 'Sign up failed';
        }
      } catch (e) {
        err.textContent = 'Network error. Please try again.';
      } finally {
        if (!redirecting) {
          btn.disabled = false;
          btn.innerHTML = originalBtn;
        }
      }
    });
  </script>
</body>
</html>
