<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · Tenant Screener</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --panel: #ffffff;
      --ink: #101828;
      --muted: #667085;
      --line: #e4e7ec;
      --accent: #2563eb;
      --accent-soft: #eef4ff;
      --bad: #dc2626;
      --radius: 12px;
      --radius-sm: 8px;
      --shadow: 0 10px 30px rgba(16,24,40,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px 16px;
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.5;
    }
    .login-shell { width: min(400px, 100%); }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .logo {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(135deg,#3b82f6,#6366f1);
      display: grid; place-items: center;
      font-size: 13px; font-weight: 800; letter-spacing: .04em; color: #fff;
    }
    .brand-text { font-weight: 700; font-size: 18px; }
    .brand-sub { color: var(--muted); font-size: 13px; margin-top: 2px; }
    form {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 28px 24px;
      display: grid;
      gap: 16px;
      box-shadow: var(--shadow);
    }
    h1 { font-size: 20px; margin: 0; }
    .intro { color: var(--muted); font-size: 13px; margin: 0; }
    label { display: grid; gap: 6px; font-size: 13px; font-weight: 600; color: #344054; }
    input {
      font: inherit;
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      border: 1px solid var(--line);
      width: 100%;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    button {
      font: inherit;
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      border: 1px solid var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 4px;
    }
    button:hover { filter: brightness(1.05); }
    button:disabled { opacity: .7; cursor: progress; }
    button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .spinner {
      width: 15px; height: 15px;
      border: 2px solid currentColor; border-top-color: transparent;
      border-radius: 50%; animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { color: var(--bad); min-height: 20px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="login-shell">
    <div class="brand">
      <span class="logo" aria-hidden="true">TS</span>
      <div>
        <div class="brand-text">Tenant Screener</div>
        <div class="brand-sub">Admin sign-in</div>
      </div>
    </div>
    <form id="login-form">
      <div>
        <h1>Sign in</h1>
        <p class="intro">Use the email and password for your team account.</p>
      </div>
      <label>Email address
        <input name="email" type="email" autocomplete="username" required>
      </label>
      <label>Password
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit" id="submit">Sign in</button>
      <div class="error" id="error" role="alert" aria-live="polite"></div>
    </form>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const btn = document.getElementById('submit');
      const error = document.getElementById('error');
      error.textContent = '';
      const original = btn.innerHTML;
      let redirecting = false;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner" aria-hidden="true"></span> Signing in\u2026';
      const form = new FormData(event.currentTarget);
      try {
        const response = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: form.get('email'), password: form.get('password') })
        });
        if (response.ok) {
          redirecting = true;
          btn.innerHTML = '<span class="spinner" aria-hidden="true"></span> Redirecting\u2026';
          window.location.href = '/admin/dashboard';
          return;
        }
        const body = await response.json().catch(() => ({}));
        error.textContent = body.detail || 'Sign-in failed. Check your email and password.';
      } catch (e) {
        error.textContent = 'Network error. Please try again.';
      } finally {
        if (!redirecting) {
          btn.disabled = false;
          btn.innerHTML = original;
        }
      }
    });
  </script>
</body>
</html>
