<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Talk to our Assistant</title>
  <style>
    :root {
      --idle-1: #3b82f6;
      --idle-2: #6366f1;
      --live-1: #10b981;
      --live-2: #06b6d4;
      --end-1: #64748b;
      --end-2: #475569;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(1200px 800px at 50% -10%, #1e293b 0%, transparent 60%),
        radial-gradient(900px 700px at 90% 110%, #312e81 0%, transparent 55%),
        radial-gradient(900px 700px at 5% 100%, #0f766e 0%, transparent 55%),
        #060912;
      color: #e5e7eb;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100dvh; overflow: hidden; user-select: none;
    }

    .stage { display: flex; flex-direction: column; align-items: center; gap: 40px; }

    /* The orb button */
    .orb-wrap { position: relative; width: 260px; height: 260px; display: grid; place-items: center; }

    /* Animated rings emanating outward */
    .ring {
      position: absolute; inset: 0; border-radius: 50%;
      border: 2px solid rgba(99,102,241,.45);
      opacity: 0; pointer-events: none;
    }
    .state-live .ring { animation: ripple 2.4s ease-out infinite; border-color: rgba(16,185,129,.5); }
    .state-live .ring:nth-child(2) { animation-delay: .8s; }
    .state-live .ring:nth-child(3) { animation-delay: 1.6s; }
    @keyframes ripple {
      0% { transform: scale(.7); opacity: .7; }
      100% { transform: scale(1.45); opacity: 0; }
    }

    .orb {
      position: relative;
      width: 200px; height: 200px; border-radius: 50%;
      border: none; cursor: pointer; color: #fff;
      background: radial-gradient(circle at 32% 28%, var(--idle-1), var(--idle-2) 72%);
      box-shadow:
        0 0 0 1px rgba(255,255,255,.10) inset,
        0 18px 50px rgba(59,130,246,.45),
        0 0 70px rgba(99,102,241,.35);
      display: grid; place-items: center; gap: 6px;
      transition: transform .18s ease, box-shadow .35s ease, background .45s ease;
      animation: breathe 4s ease-in-out infinite;
    }
    .orb:active { transform: scale(.96); }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 0 1px rgba(255,255,255,.10) inset, 0 18px 50px rgba(59,130,246,.40), 0 0 60px rgba(99,102,241,.30); }
      50% { box-shadow: 0 0 0 1px rgba(255,255,255,.14) inset, 0 22px 60px rgba(59,130,246,.55), 0 0 90px rgba(99,102,241,.45); }
    }

    .orb .icon { font-size: 52px; line-height: 1; filter: drop-shadow(0 2px 6px rgba(0,0,0,.3)); }
    .orb .label { font-size: 16px; font-weight: 700; letter-spacing: .01em; }

    /* Live state */
    .state-live .orb {
      background: radial-gradient(circle at 32% 28%, var(--live-1), var(--live-2) 72%);
      box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset, 0 18px 55px rgba(16,185,129,.5), 0 0 90px rgba(6,182,212,.4);
      animation: livePulse 1.8s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }

    /* Connecting state */
    .state-connecting .orb { animation: spinGlow 1.2s linear infinite; cursor: progress; }
    @keyframes spinGlow {
      0% { box-shadow: 0 0 0 1px rgba(255,255,255,.1) inset, 0 0 40px rgba(99,102,241,.4); }
      50% { box-shadow: 0 0 0 1px rgba(255,255,255,.2) inset, 0 0 80px rgba(99,102,241,.7); }
      100% { box-shadow: 0 0 0 1px rgba(255,255,255,.1) inset, 0 0 40px rgba(99,102,241,.4); }
    }

    /* Ended state */
    .state-ended .orb {
      background: radial-gradient(circle at 32% 28%, var(--end-1), var(--end-2) 72%);
      box-shadow: 0 14px 40px rgba(15,23,42,.5);
      animation: none;
    }

    .caption { font-size: 15px; color: #94a3b8; min-height: 22px; text-align: center; letter-spacing: .02em; transition: color .3s; }
    .title { position: absolute; top: 34px; font-size: 14px; letter-spacing: .22em; text-transform: uppercase; color: #64748b; font-weight: 600; }

    /* Soft equalizer bars under the orb while live */
    .eq { display: flex; gap: 5px; height: 26px; align-items: flex-end; opacity: 0; transition: opacity .3s; }
    .state-live .eq { opacity: 1; }
    .eq span { width: 5px; background: linear-gradient(180deg, #5eead4, #22d3ee); border-radius: 4px; height: 30%; animation: bounce 1s ease-in-out infinite; }
    .eq span:nth-child(2){ animation-delay:.1s } .eq span:nth-child(3){ animation-delay:.2s }
    .eq span:nth-child(4){ animation-delay:.3s } .eq span:nth-child(5){ animation-delay:.15s }
    .eq span:nth-child(6){ animation-delay:.25s } .eq span:nth-child(7){ animation-delay:.05s }
    @keyframes bounce { 0%,100%{height:25%} 50%{height:100%} }
  </style>
</head>
<body>
  <div class="title">AI Leasing Assistant</div>
  <div class="stage" id="stage">
    <div class="orb-wrap" id="orbWrap">
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <button class="orb" id="orb" aria-label="Start call">
        <span class="icon" id="orbIcon">📞</span>
        <span class="label" id="orbLabel">Start Call</span>
      </button>
    </div>
    <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
    <div class="caption" id="caption">Tap to talk with our assistant</div>
  </div>

  <audio id="audioPlayer" playsinline webkit-playsinline style="display:none"></audio>

  <script src="/static/js/voice-call.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    let phase = "idle";
    let callId = null;
    let ws = null;
    let voiceMic = null;

    const playback = VoiceCall.createPlaybackManager({
      playerId: "audioPlayer",
      volume: 0.9,
      getMic: () => voiceMic,
      onSpeaking() {
        if (phase === "live") $("caption").textContent = "Assistant speaking…";
      },
      onMicLive() {
        if (phase === "live") $("caption").textContent = "Listening…";
      },
      onStopPlayback() {},
    });
    const {
      enqueueAgentAudio,
      stopAgentPlayback,
      clearPendingUnmute,
    } = playback;

    function setPhase(p, caption) {
      phase = p;
      $("stage").className = "stage";              // reset
      $("orbWrap").className = "orb-wrap";
      if (p === "connecting") $("orbWrap").classList.add("state-connecting");
      if (p === "live")       $("orbWrap").classList.add("state-live");
      if (p === "ended")      $("orbWrap").classList.add("state-ended");

      const icon = $("orbIcon"), label = $("orbLabel");
      if (p === "idle")       { icon.textContent = "📞"; label.textContent = "Start Call"; }
      if (p === "connecting") { icon.textContent = "…";  label.textContent = "Connecting"; }
      if (p === "live")       { icon.textContent = "⏹";  label.textContent = "Tap to End"; }
      if (p === "ended")      { icon.textContent = "✓";  label.textContent = "Call Ended"; }
      if (caption !== undefined) $("caption").textContent = caption;
    }

    async function api(path, body) {
      const r = await fetch(path, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body || {}) });
      if (!r.ok) throw new Error((await r.text()) || r.statusText);
      return r.json();
    }

    async function startCall() {
      setPhase("connecting", "Connecting…");
      try {
        const data = await api("/test/api/start", { mode: "voice", phone_number: "+15555550123" });
        callId = data.call_id;
        ws = new WebSocket(data.ws_url);

        ws.onopen = async () => {
          ws.send(JSON.stringify({ event: "start" }));
          try {
            voiceMic = new VoiceCall.VoiceStreamingMic(ws);
            await voiceMic.start();
            setPhase("live", "Connected — say hello!");
          } catch (e) {
            setPhase("idle", "Microphone access is needed to talk.");
            cleanup();
          }
        };

        ws.onmessage = (ev) => {
          let msg; try { msg = JSON.parse(ev.data); } catch (_) { return; }
          if (msg.event === "play_wav" && msg.audio_wav_b64) {
            enqueueAgentAudio(msg.audio_wav_b64, msg.turn_end);
          } else if (msg.event === "interrupt") {
            stopAgentPlayback();
          } else if (msg.event === "transcript") {
            if (phase === "live") $("caption").textContent = "…";
          } else if (msg.event === "complete") {
            endCall("Thanks for your time. Goodbye!");
          } else if (msg.event === "error") {
            // keep the call alive; surface a soft hint
            if (phase === "live") $("caption").textContent = "One moment…";
          }
        };

        ws.onerror = () => { if (phase !== "ended") setPhase("idle", "Connection problem. Tap to try again."); cleanup(); };
        ws.onclose = () => { if (phase === "live" || phase === "connecting") { setPhase("idle", "Call disconnected. Tap to start again."); cleanup(); } };
      } catch (e) {
        setPhase("idle", "Couldn't start the call. Tap to try again.");
        cleanup();
      }
    }

    function cleanup() {
      if (voiceMic) { voiceMic.stop(); voiceMic = null; }
      clearPendingUnmute();
      playback.stopAgentPlayback();
      if (ws) { try { ws.send(JSON.stringify({ event: "stop" })); } catch (_) {} try { ws.close(); } catch (_) {} ws = null; }
    }

    async function endCall(caption) {
      const id = callId;
      cleanup();
      setPhase("ended", caption || "Call ended.");
      if (id) { try { await api("/test/api/end", { call_id: id }); } catch (_) {} }
      // Return to idle shortly so the client can call again.
      setTimeout(() => { if (phase === "ended") setPhase("idle", "Tap to talk with our assistant"); }, 2600);
    }

    $("orb").addEventListener("click", () => {
      VoiceCall.unlockAudioPlayback("audioPlayer", 0.9);
      if (phase === "idle" || phase === "ended") startCall();
      else if (phase === "live") endCall("Call ended.");
      // ignore taps while connecting
    });
  </script>
</body>
</html>
