# Render Blueprint — deploy with "New > Blueprint" pointing at this repo.

#

# Architecture (see README): one web instance (live call sessions are held

# in-memory per process, so the web service MUST stay at a single instance),

# plus a Celery worker and a single Celery beat scheduler, backed by a

# managed Redis (broker/cache) and an external Postgres (set DATABASE_URL).

#

# Secrets marked `sync: false` must be filled in the Render dashboard.



services:

  # ── Web (FastAPI / uvicorn) ────────────────────────────────────────────────

  - type: web

    name: ai-screener-web

    runtime: docker

    dockerfilePath: ./Dockerfile

    dockerCommand: /app/docker-entrypoint.sh web

    plan: free

    # CRITICAL: keep this at exactly 1. Live call state is per-process; scaling

    # the web tier splits sessions across instances and breaks calls.

    numInstances: 1

    healthCheckPath: /health

    envVars:

      - key: ENVIRONMENT

        value: production

      - key: DEBUG

        value: "false"

      - key: SECRET_KEY

        generateValue: true

      - key: ENCRYPTION_KEY

        sync: false

      - key: APP_URL

        sync: false

      - key: ADMIN_EMAIL

        sync: false

      - key: ADMIN_PASSWORD

        sync: false

      - key: DATABASE_URL

        sync: false

      - key: DATABASE_MIGRATION_MODE

        value: check

      - key: REDIS_URL

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString

      - key: CELERY_BROKER_URL

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString

      - key: CELERY_RESULT_BACKEND

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString

      - key: TELNYX_API_KEY

        sync: false

      - key: TELNYX_PUBLIC_KEY

        sync: false

      - key: DEEPGRAM_API_KEY

        sync: false

      - key: GROQ_API_KEY

        sync: false

      - key: OPENAI_API_KEY

        sync: false

      - key: OPENROUTER_API_KEY

        sync: false

      - key: GEMINI_API_KEY

        sync: false

      - key: RESEND_API_KEY

        sync: false

      - key: EMAIL_FROM

        sync: false

      - key: EMAIL_FROM_NAME

        sync: false

      - key: TRUSTED_PROXY_IPS

        sync: false

      - key: SUPABASE_URL

        sync: false

      - key: SUPABASE_SECRET_KEY

        sync: false

      - key: SUPABASE_STORAGE_BUCKET

        value: call-recordings



  # ── Celery worker (emails, CRM webhooks, retention) ─────────────────────────

  - type: worker

    name: ai-screener-worker

    runtime: docker

    dockerfilePath: ./Dockerfile

    dockerCommand: /app/docker-entrypoint.sh worker

    plan: free

    envVars:

      - key: ENVIRONMENT

        value: production

      - key: DEBUG

        value: "false"

      - key: SECRET_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: SECRET_KEY

      - key: ENCRYPTION_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: ENCRYPTION_KEY

      - key: APP_URL

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: APP_URL

      - key: DATABASE_URL

        sync: false

      - key: REDIS_URL

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString

      - key: CELERY_BROKER_URL

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString

      - key: CELERY_RESULT_BACKEND

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString

      - key: RESEND_API_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: RESEND_API_KEY

      - key: EMAIL_FROM

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: EMAIL_FROM

      - key: EMAIL_FROM_NAME

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: EMAIL_FROM_NAME

      - key: SUPABASE_URL

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: SUPABASE_URL

      - key: SUPABASE_SECRET_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: SUPABASE_SECRET_KEY

      - key: SUPABASE_STORAGE_BUCKET

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: SUPABASE_STORAGE_BUCKET

      - key: DEEPGRAM_API_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: DEEPGRAM_API_KEY

      - key: GROQ_API_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: GROQ_API_KEY

      - key: OPENAI_API_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: OPENAI_API_KEY

      - key: OPENROUTER_API_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: OPENROUTER_API_KEY

      - key: GEMINI_API_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: GEMINI_API_KEY



  # ── Celery beat (scheduler — MUST be a single instance) ─────────────────────

  - type: worker

    name: ai-screener-beat

    runtime: docker

    dockerfilePath: ./Dockerfile

    dockerCommand: /app/docker-entrypoint.sh beat

    plan: free

    numInstances: 1

    envVars:

      - key: ENVIRONMENT

        value: production

      - key: DEBUG

        value: "false"

      - key: SECRET_KEY

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: SECRET_KEY

      - key: APP_URL

        fromService:

          name: ai-screener-web

          type: web

          envVarKey: APP_URL

      - key: DATABASE_URL

        sync: false

      - key: REDIS_URL

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString

      - key: CELERY_BROKER_URL

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString

      - key: CELERY_RESULT_BACKEND

        fromService:

          name: ai-screener-redis

          type: redis

          property: connectionString



  # ── Managed Redis (broker + cache + idempotency) ────────────────────────────

  # noeviction so the Celery broker never silently drops queued tasks.

  - type: redis

    name: ai-screener-redis

    plan: free

    maxmemoryPolicy: noeviction

    ipAllowList: []

